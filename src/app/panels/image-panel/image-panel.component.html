<evt-panel [showSecondaryContent]="isSecondaryContentOpened()">
    <div header-left>
    <ng-select 
        class="mr-1"
        bindLabel="label"
        bindValue="label"
        [searchable]="true" 
        [clearable]="false"
        [ngModel]="currentImg"
        (change)="toggleImg($event)">
        <ng-option [value]="item" *ngFor="let item of images;">
            {{ item.label }}
        </ng-option>
    </ng-select>
    <ng-select
        class="mr-1"
        [closeOnSelect]="true" 
        [searchable]="false"
        bindLabel="id"
        bindValue="id"
        [items]="msDesc$ | async"
        [clearable]="true"
        (clear)="resetMsDesc();"
        [placeholder]="'selectMsDesc' | translate" 
        (change)="msDescID = $event.id; toggleMsDescContent()">
        <ng-template
            ng-id-tmp
            let-item="item">
            {{ item.id }}
        </ng-template>
    </ng-select>
    </div>
    <div content>
        <evt-osd
            *ngIf="manifest"
            [manifestURL]="manifest"
            [page]="imageIndex"
            (data)="eventHandler($event)"
        >
        </evt-osd>
        <p *ngIf="!manifest">Found no manifest file</p>
    </div>
    <div secondary-content>
        <div *ngIf="(msDesc$ | async) as msDescs">
            <div *ngFor="let msDesc of msDescs">
                <evt-ms-desc *ngIf="msDesc.id == msDescID" [data]="msDesc"></evt-ms-desc>    
            </div>
        </div>
    </div>
</evt-panel>
